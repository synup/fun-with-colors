<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ira's Coloring Studio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Baloo 2', 'Segoe UI', sans-serif;
      background: #f0e6ff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: linear-gradient(135deg, #ff6b9d, #c44dff, #6ec6ff);
      color: white;
      text-align: center;
      padding: 8px 10px;
      font-size: 1.4rem;
      font-weight: 800;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
      letter-spacing: 2px;
      position: relative;
    }

    .header-sub {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 3px;
      opacity: 0.9;
      display: block;
    }

    /* Welcome overlay */
    .welcome-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #ff6b9d, #c44dff, #6ec6ff);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: white;
      animation: welcomeFade 4s ease-in-out forwards;
      pointer-events: none;
    }
    .welcome-overlay h1 {
      font-size: 3rem;
      font-weight: 800;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.2);
      animation: welcomePop 0.6s ease-out;
    }
    .welcome-overlay p {
      font-size: 1.2rem;
      margin-top: 8px;
      opacity: 0.95;
      letter-spacing: 2px;
    }
    .welcome-overlay .welcome-skz {
      font-size: 0.9rem;
      margin-top: 16px;
      opacity: 0.8;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    @keyframes welcomePop {
      0% { transform: scale(0.3); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes welcomeFade {
      0%, 70% { opacity: 1; }
      100% { opacity: 0; display: none; }
    }

    .app {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* --- Sidebar --- */
    .sidebar {
      width: 220px;
      background: #fff;
      border-right: 3px solid #e0d0f0;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 12px;
      overflow-y: auto;
    }

    .sidebar h3 {
      font-size: 0.85rem;
      color: #7c5cbf;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 2px solid #e0d0f0;
      padding-bottom: 4px;
    }

    /* Tools */
    .tools { display: flex; gap: 6px; flex-wrap: wrap; }

    .tool-btn {
      flex: 1;
      min-width: 90px;
      padding: 10px 6px;
      border: 2px solid #d0c0e8;
      border-radius: 10px;
      background: #faf5ff;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      color: #5a3d8a;
      transition: all 0.15s;
      text-align: center;
    }
    .tool-btn:hover { background: #ede0ff; }
    .tool-btn.active { background: #c44dff; color: white; border-color: #a030dd; }

    /* Brush size */
    .brush-size-section { display: flex; flex-direction: column; gap: 4px; }
    .brush-size-section input { width: 100%; }
    .brush-size-label { font-size: 0.75rem; color: #888; text-align: center; }

    /* Color palette */
    .color-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
    }

    .color-swatch {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 6px;
      border: 2px solid #e0d0f0;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.1s;
    }
    .color-swatch:hover { transform: scale(1.15); z-index: 1; }
    .color-swatch.active { border: 3px solid #333; transform: scale(1.15); }

    .custom-color-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .custom-color-row input[type="color"] {
      width: 40px; height: 34px; border: none; cursor: pointer;
      border-radius: 6px;
    }
    .custom-color-row span { font-size: 0.8rem; color: #777; }

    /* Current color preview */
    .current-color {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .current-color .preview {
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 2px solid #999;
    }
    .current-color span { font-size: 0.8rem; color: #555; }

    /* Drawing selector */
    .drawing-selector {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .drawing-btn {
      padding: 8px;
      border: 2px solid #d0c0e8;
      border-radius: 8px;
      background: #faf5ff;
      cursor: pointer;
      font-size: 0.8rem;
      color: #5a3d8a;
      font-weight: 600;
      transition: all 0.15s;
    }
    .drawing-btn:hover { background: #ede0ff; }
    .drawing-btn.active { background: #c44dff; color: white; border-color: #a030dd; }

    /* Action buttons */
    .actions { display: flex; flex-direction: column; gap: 6px; margin-top: auto; }

    .action-btn {
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .reset-btn { background: #ff6b6b; color: white; }
    .reset-btn:hover { background: #ee5a5a; }
    .save-btn { background: #51cf66; color: white; }
    .save-btn:hover { background: #40c057; }

    /* --- Canvas area --- */
    .canvas-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e8ddf5;
      padding: 20px;
    }

    canvas {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      cursor: crosshair;
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>
<body>

<div class="welcome-overlay" id="welcomeOverlay">
  <h1>Hi Ira!</h1>
  <p>Welcome to your Coloring Studio</p>
  <div class="welcome-skz">SKZ STAY Forever</div>
</div>

<header>
  Ira's Coloring Studio
  <span class="header-sub">STAY Creative</span>
</header>

<div class="app">
  <div class="sidebar">

    <!-- Drawing picker -->
    <h3>Drawings</h3>
    <div class="drawing-selector" id="drawingSelector"></div>

    <!-- Tools -->
    <h3>Tools</h3>
    <div class="tools">
      <button class="tool-btn active" data-tool="brush">Brush</button>
      <button class="tool-btn" data-tool="bucket">Bucket</button>
    </div>

    <!-- Brush size -->
    <div class="brush-size-section" id="brushSizeSection">
      <h3>Brush Size</h3>
      <input type="range" id="brushSize" min="2" max="30" value="8">
      <div class="brush-size-label" id="brushSizeLabel">8 px</div>
    </div>

    <!-- Current color -->
    <h3>Selected Color</h3>
    <div class="current-color">
      <div class="preview" id="currentColorPreview" style="background:#ff6b6b"></div>
      <span id="currentColorHex">#ff6b6b</span>
    </div>

    <!-- Color palette -->
    <h3>Colors</h3>
    <div class="color-grid" id="colorGrid"></div>

    <div class="custom-color-row">
      <input type="color" id="customColor" value="#ff6b6b">
      <span>Pick custom</span>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="action-btn reset-btn" id="resetBtn">Reset Drawing</button>
      <button class="action-btn save-btn" id="saveBtn">Save as Image</button>
    </div>
  </div>

  <div class="canvas-area">
    <canvas id="canvas" width="800" height="600"></canvas>
  </div>
</div>

// ─── State ───
let currentTool = 'brush';
let currentColor = '#ff6b6b';
let brushSize = 8;
let currentDrawingIndex = 0;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let painting = false;

// ─── Initialize color grid ───
const colorGrid = document.getElementById('colorGrid');
COLORS.forEach((color, i) => {
  const swatch = document.createElement('div');
  swatch.className = 'color-swatch' + (color === currentColor ? ' active' : '');
  swatch.style.background = color;
  swatch.title = color;
  swatch.addEventListener('click', () => selectColor(color, swatch));
  colorGrid.appendChild(swatch);
});

// ─── Initialize drawing buttons ───
const drawingSelector = document.getElementById('drawingSelector');
DRAWINGS.forEach((d, i) => {
  const btn = document.createElement('button');
  btn.className = 'drawing-btn' + (i === 0 ? ' active' : '');
  btn.textContent = d.name;
  btn.addEventListener('click', () => loadDrawing(i));
  drawingSelector.appendChild(btn);
});

// ─── Color selection ───
function selectColor(color, swatchEl) {
  currentColor = color;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  if (swatchEl) swatchEl.classList.add('active');
  document.getElementById('currentColorPreview').style.background = color;
  document.getElementById('currentColorHex').textContent = color;
  document.getElementById('customColor').value = color;
}

document.getElementById('customColor').addEventListener('input', (e) => {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  selectColor(e.target.value, null);
});

// ─── Tool selection ───
document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentTool = btn.dataset.tool;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('brushSizeSection').style.display =
      currentTool === 'brush' ? 'flex' : 'none';
    canvas.style.cursor = currentTool === 'bucket' ? 'cell' : 'crosshair';
  });
});

// ─── Brush size ───
const brushSizeInput = document.getElementById('brushSize');
brushSizeInput.addEventListener('input', () => {
  brushSize = parseInt(brushSizeInput.value);
  document.getElementById('brushSizeLabel').textContent = brushSize + ' px';
});

// ─── Load drawing onto canvas ───
function loadDrawing(index) {
  currentDrawingIndex = index;
  document.querySelectorAll('.drawing-btn').forEach((b, i) => {
    b.classList.toggle('active', i === index);
  });

  const img = new Image();
  const svgBlob = new Blob([DRAWINGS[index].svg], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(svgBlob);

  img.onload = () => {
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

// ─── Brush drawing ───
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY
  };
}

function startPaint(e) {
  if (currentTool !== 'brush') return;
  painting = true;
  const pos = getPos(e);
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = currentColor;
  ctx.lineWidth = brushSize;
}

function paint(e) {
  if (!painting) return;
  e.preventDefault();
  const pos = getPos(e);
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
}

function stopPaint() {
  painting = false;
  ctx.beginPath();
}

canvas.addEventListener('mousedown', (e) => {
  if (currentTool === 'bucket') {
    const pos = getPos(e);
    floodFill(Math.round(pos.x), Math.round(pos.y), currentColor);
  } else {
    startPaint(e);
  }
});
canvas.addEventListener('mousemove', paint);
canvas.addEventListener('mouseup', stopPaint);
canvas.addEventListener('mouseleave', stopPaint);

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (currentTool === 'bucket') {
    const pos = getPos(e);
    floodFill(Math.round(pos.x), Math.round(pos.y), currentColor);
  } else {
    startPaint(e);
  }
});
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); paint(e); });
canvas.addEventListener('touchend', stopPaint);

// ─── Flood fill (bucket tool) ───
function floodFill(startX, startY, fillColor) {
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;
  const w = canvas.width;
  const h = canvas.height;

  const idx = (x, y) => (y * w + x) * 4;

  const startIdx = idx(startX, startY);
  const startR = data[startIdx], startG = data[startIdx+1],
        startB = data[startIdx+2], startA = data[startIdx+3];

  // Parse fill color
  const tempEl = document.createElement('div');
  tempEl.style.color = fillColor;
  document.body.appendChild(tempEl);
  const rgb = getComputedStyle(tempEl).color.match(/\d+/g).map(Number);
  document.body.removeChild(tempEl);
  const [fillR, fillG, fillB] = rgb;

  // Don't fill if same color
  if (startR === fillR && startG === fillG && startB === fillB && startA === 255) return;

  // Don't fill black outlines
  if (startR < 40 && startG < 40 && startB < 40 && startA > 200) return;

  const tolerance = 32;
  function matches(i) {
    return Math.abs(data[i] - startR) <= tolerance &&
           Math.abs(data[i+1] - startG) <= tolerance &&
           Math.abs(data[i+2] - startB) <= tolerance &&
           Math.abs(data[i+3] - startA) <= tolerance;
  }

  const stack = [[startX, startY]];
  const visited = new Uint8Array(w * h);

  while (stack.length > 0) {
    const [x, y] = stack.pop();
    if (x < 0 || x >= w || y < 0 || y >= h) continue;

    const vi = y * w + x;
    if (visited[vi]) continue;
    visited[vi] = 1;

    const i = idx(x, y);
    if (!matches(i)) continue;

    data[i] = fillR;
    data[i+1] = fillG;
    data[i+2] = fillB;
    data[i+3] = 255;

    stack.push([x+1, y], [x-1, y], [x, y+1], [x, y-1]);
  }

  ctx.putImageData(imageData, 0, 0);
}

// ─── Reset ───
document.getElementById('resetBtn').addEventListener('click', () => {
  loadDrawing(currentDrawingIndex);
});

// ─── Save ───
document.getElementById('saveBtn').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'iras-coloring.png';
  link.href = canvas.toDataURL();
  link.click();
});

// ─── Welcome overlay ───
setTimeout(() => {
  const overlay = document.getElementById('welcomeOverlay');
  if (overlay) overlay.style.display = 'none';
}, 4000);

// ─── Init ───
loadDrawing(0);
</script>
